<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduTrack</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #050b14;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.4), transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(147, 51, 234, 0.3), transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .login-card {
            background: #11151e;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 1rem;
        }

        /* Toggle Component with Sliding Pill */
        .role-toggle {
            position: relative;
            display: flex;
            background: #090c10;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            overflow: hidden;
        }

        .toggle-slider {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            width: calc(50% - 4px); /* Account for padding */
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 6px;
            box-shadow: 
                0 4px 15px rgba(255, 255, 255, 0.15), 
                inset 0 1px 2px rgba(255, 255, 255, 0.9),
                inset 0 -2px 5px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* Premium bouncy easing */
            z-index: 0;
        }

        .role-toggle[data-active="teacher"] .toggle-slider {
            transform: translateX(100%);
        }

        .role-btn {
            position: relative;
            flex: 1;
            padding: 0.7rem;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: #8b949e;
            cursor: pointer;
            transition: color 0.3s ease;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            background: transparent;
            border: none;
            outline: none;
        }

        .role-btn.active {
            color: #111827; /* Dark slate so text is readable over the white glossy pill */
            font-weight: 600;
        }

        /* Slide & Fade Animation for Text updates */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-switch {
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Text and Form Styling */
        .login-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        .login-header p { color: #8b949e; font-size: 0.85rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 600; color: #8b949e; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input { width: 100%; background: #090c10; border: 1px solid rgba(255, 255, 255, 0.05); padding: 0.85rem 1rem; border-radius: 8px; color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.2s, background-color 0.2s; }
        .form-group input:focus { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .form-group input::placeholder { color: rgba(139, 148, 158, 0.3); font-family: inherit; }
        .btn-submit { width: 100%; background: #3b82f6; color: #fff; border: none; padding: 0.85rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 1rem; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .btn-submit:hover { background: #2563eb; box-shadow: 0 0 25px rgba(59, 130, 246, 0.6); transform: translateY(-1px); }
        .error-text { color: #ef4444; font-size: 0.75rem; text-align: center; margin: -0.5rem 0 1rem 0; font-weight: 500; }
        .link-text { text-align: center; margin-top: 1.5rem; font-size: 0.75rem; }
        .link-text a { color: #8b949e; text-decoration: none; transition: color 0.2s; border-bottom: 1px dotted rgba(139, 148, 158, 0.5); padding-bottom: 2px; }
        .link-text a:hover { color: #fff; border-bottom-color: #fff; }
    </style>
</head>
<body>

    <div class="login-card">
        
        <!-- Toggle Component with physical slider indicator -->
        <div class="role-toggle" id="role_toggle_container" data-active="student">
            <div class="toggle-slider"></div>
            <button type="button" class="role-btn active" id="btn-student" onclick="setRole('student')">
                <span>🎓</span> Student
            </button>
            <button type="button" class="role-btn" id="btn-teacher" onclick="setRole('teacher')">
                <span>👨‍🏫</span> Teacher
            </button>
        </div>

        <div class="login-header">
            <h2 id="title" class="animate-switch">Welcome Back, Student!</h2>
            <p id="subtitle" class="animate-switch">Track your grades, attendance, and progress.</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="error-text">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <input type="hidden" name="role_type" id="role_type" value="student">

            <div class="form-group">
                <label id="lbl-username" for="username" class="animate-switch">ROLL NUMBER</label>
                <input type="text" id="username" name="username" class="animate-switch" required placeholder="e.g. STU001">
            </div>
            
            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-submit animate-switch" id="btn-submit-login">Login to Dashboard</button>
        </form>

        <div class="link-text">
            <a href="{{ url_for('register') }}" id="create_account_link" class="animate-switch">New Student? Create an Account</a>
        </div>
        
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
